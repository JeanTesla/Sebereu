<h2 mat-dialog-title>Nova Contribuição</h2>
<mat-dialog-content class="mat-typography">
    <mat-stepper orientation="vertical" [linear]="true" #stepper>
        <mat-step [stepControl]="formInfo">
            <form [formGroup]="formInfo">
                <ng-template matStepLabel>Informações</ng-template>
                <mat-grid-list cols="2" rowHeight="3:1">
                    <mat-grid-tile rowspan="2">
                        <div class="form">
                            <mat-form-field class="fields">
                                <mat-label>Título</mat-label>
                                <input matInput placeholder="Título da contribuição" required formControlName="title">
                            </mat-form-field>
                            <mat-form-field>
                                <mat-label>Artista</mat-label>
                                <input matInput placeholder="Artista" required formControlName="artist">
                            </mat-form-field>
                            <mat-form-field>
                                <mat-label>Arranjo</mat-label>
                                <input matInput placeholder="Autor Arranjo" formControlName="arrangement">
                            </mat-form-field>
                        </div>
                    </mat-grid-tile>
                    <mat-grid-tile>
                        <div style="width: 100%; height: 100%; overflow: auto;">
                            <section>
                                <label>Tipo de partitura:</label>
                                <div>
                                    <mat-radio-group (change)="onSelectSheetType($event)" required
                                        formControlName="sheetType">
                                        <mat-radio-button value="GRID" checked="true">
                                            Grade
                                        </mat-radio-button>
                                        <mat-radio-button value="INSTRUMENT">
                                            Instrumento
                                        </mat-radio-button>
                                    </mat-radio-group>
                                </div>
                            </section>

                            <mat-form-field class="example-chip-list" *ngIf="!isGridSheetType">
                                <mat-label>Informe o nome do(s) instrumento</mat-label>
                                <mat-chip-grid #chipGrid aria-label="instrument selection"
                                    formControlName="instrumentPicker">
                                    <mat-chip-row *ngFor="let instrument of selectedInstruments"
                                        (removed)="removeSelectedInstrument(instrument)">
                                        {{instrument}}
                                        <button matChipRemove [attr.aria-label]="'remove ' + instrument">
                                            <mat-icon>cancel</mat-icon>
                                        </button>
                                    </mat-chip-row>
                                </mat-chip-grid>
                                <input #instrumentInput (keyup)="filterOptions($event, 'instruments')"
                                    placeholder="Informe o nome do instrumento" [matChipInputFor]="chipGrid"
                                    [matAutocomplete]="auto" [matChipInputSeparatorKeyCodes]="separatorKeysCodes" />
                                <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onSelectInstrument($event)">
                                    <mat-option *ngFor="let instrument of filteredOptionsInstruments"
                                        [value]="instrument">
                                        {{instrument}}
                                    </mat-option>
                                </mat-autocomplete>
                            </mat-form-field>
                        </div>
                    </mat-grid-tile>
                </mat-grid-list>
                <div align="end">
                    <button mat-button matStepperNext>Próximo</button>
                </div>
            </form>
        </mat-step>
        <mat-step [stepControl]="formAdditionalInfo" label="Informações Adicionais">
            <form [formGroup]="formAdditionalInfo">
                <ng-template matStepLabel>Informações Adicionais</ng-template>
                <mat-grid-list cols="2" rowHeight="2:1" style="margin-top: 25px; height: 100%;">
                    <div class="form">
                        <mat-grid-tile>
                            <mat-form-field style="height: 100%; width: 95%;">
                                <mat-label>Descrição</mat-label>
                                <textarea style="width: max-content;" rows="8" matInput
                                    formControlName="description"></textarea>
                            </mat-form-field>
                        </mat-grid-tile>
                        <mat-grid-tile>
                            <div style="width: 100%; height: 100%;">
                                <section>
                                    <label>Gênero musical:</label>
                                    <div>
                                        <mat-radio-group (change)="onSelectGenre($event)" required
                                            formControlName="musicalGenre">
                                            <mat-radio-button value="UNIQUE" checked="true">
                                                Único Gênero
                                            </mat-radio-button>
                                            <mat-radio-button value="POTPOURRI">
                                                Pot-Pourri
                                            </mat-radio-button>
                                        </mat-radio-group>
                                    </div>
                                </section>

                                <mat-form-field class="example-chip-list fields">
                                    <mat-label>Informe o nome do gênero</mat-label>
                                    <mat-chip-grid #chipGrid aria-label="genre selection" formControlName="genrePicker">
                                        <mat-chip-row *ngFor="let genre of selectedGenres"
                                            (removed)="removeSelectedGenre(genre)">
                                            {{genre}}
                                            <button matChipRemove [attr.aria-label]="'remove ' + genre">
                                                <mat-icon>cancel</mat-icon>
                                            </button>
                                        </mat-chip-row>
                                    </mat-chip-grid>
                                    <input #genreInput (keyup)="filterOptions($event, 'genres')"
                                        placeholder="Informe o nome do gênero" [matChipInputFor]="chipGrid"
                                        [matAutocomplete]="auto" [matChipInputSeparatorKeyCodes]="separatorKeysCodes" />
                                    <mat-autocomplete #auto="matAutocomplete" aria-required="true" required
                                        (optionSelected)="onSelectMusicalGenre($event)">
                                        <mat-option *ngFor="let genre of filteredOptionsGenres" [value]="genre">
                                            {{genre}}
                                        </mat-option>
                                    </mat-autocomplete>
                                </mat-form-field>
                            </div>
                        </mat-grid-tile>
                    </div>
                </mat-grid-list>
                <div align="end">
                    <button mat-button matStepperPrevious>Anterior</button>
                    <button mat-button matStepperNext>Próximo</button>
                </div>
            </form>
        </mat-step>
        <mat-step>
            <ng-template matStepLabel>Arquivo</ng-template>
            <div class="form-group">
                <label for="file">Escolha o arquivo</label>
                <br>
                <input type="file" required id="file" (change)="handleFileToUpload($event)">
            </div>
            <div align="end">
                <button mat-button mat-dialog-close>Cancelar</button>
                <button mat-button (click)="finalizeNewContribution()">Contribuir</button>
            </div>
        </mat-step>
    </mat-stepper>
</mat-dialog-content>
