<mat-drawer-container style="background-color: rgb(214, 214, 214);">
    <mat-drawer mode="side" opened>
        <div class="side-nav-content">
            <mat-card class="profile">
                <img [src]="getProfileUrl()" onerror="this.src = '../../assets/images/OIP.jpeg'" class="profile-image" alt="profile-image">
                <div>
                    <label for="profile-image-input" class="profile-image-update-label">Clique para alterar</label>
                    <input type="file" (change)="handleFileToUpload($event)" id="profile-image-input">
                </div>
                <div class="profile-content">
                    <p>{{userInfo?.name}}</p>
                    <p>{{userInfo?.email}}</p>
                </div>
            </mat-card>
            <mat-list class="menu">
                <mat-list-item>
                    <div class="menu-item">
                        <a class='a-link' [routerLink]="'/home/'">Pesquisar</a>
                    </div>
                </mat-list-item>
                <mat-divider></mat-divider>
                <mat-list-item>
                    <div class="menu-item">
                        <a class='a-link' [routerLink]="'/home/my-contributions'">Minhas Contribuições</a>
                    </div>
                </mat-list-item>
                <mat-list-item>
                    <div class="menu-item">
                        <a class='a-link' (click)="signOut()">Sair</a>
                    </div>
                </mat-list-item>
                <mat-divider></mat-divider>
              </mat-list>
        </div>
    </mat-drawer>
    <mat-drawer-content>
        <div class="container">
            <router-outlet></router-outlet>
        </div>
    </mat-drawer-content>
</mat-drawer-container>
