
<div>
    Minhas contribuições
</div>

<div class="contribution-table">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="contribution">
            <th mat-header-cell *matHeaderCellDef> Contribuição </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>
        
        <ng-container matColumnDef="tags">
            <th mat-header-cell *matHeaderCellDef> Tags </th>
            <td mat-cell *matCellDef="let element">
                
                <mat-chip style="margin-right: 5px;" *ngFor="let tag of element.tags;">{{tag}}</mat-chip> 
            </td>
        </ng-container>

        <ng-container matColumnDef="upload">
            <th mat-header-cell *matHeaderCellDef> Upload </th>
            <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
        </ng-container>

        <ng-container matColumnDef="downloads">
            <th mat-header-cell *matHeaderCellDef> Donwloads </th>
            <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
